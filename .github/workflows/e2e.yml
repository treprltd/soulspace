name: E2E API Tests

# ── When does this run? ────────────────────────────────────────────────────────
# Automatically: only when E2E_BASE_URL is set as a GitHub repository variable.
#   Go to: Settings → Variables → Actions → New repository variable
#   Name: E2E_BASE_URL   Value: https://soulspacehealth.org
#
# Manually: Actions → E2E API Tests → Run workflow → enter any URL
#
# Supabase credentials are auto-selected from the target URL:
#   dev.soulspacehealth.org  →  SUPABASE_DEV_*   secrets
#   qa.soulspacehealth.org   →  SUPABASE_QA_*    secrets
#   soulspacehealth.org      →  SUPABASE_PROD_*  secrets
#
# Required GitHub SECRETS (Settings → Secrets → Actions):
#   SUPABASE_PROD_URL / SUPABASE_PROD_ANON_KEY / SUPABASE_PROD_SERVICE_KEY
#   SUPABASE_DEV_URL  / SUPABASE_DEV_ANON_KEY  / SUPABASE_DEV_SERVICE_KEY
#   SUPABASE_QA_URL   / SUPABASE_QA_ANON_KEY   / SUPABASE_QA_SERVICE_KEY
#   CRON_SECRET                    (optional — enables digest test)
#   ANTHROPIC_API_KEY              (optional — enables mirror paywall test)
#
# Email delivery test:
#   TEST_EMAIL repository variable (Settings → Variables → Actions):
#     Name: TEST_EMAIL   Value: kankanamitra01@gmail.com
#   When set, the email test suite creates a real user with that address
#   and fires every notification path — check the inbox after the run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL to test against (e.g. https://soulspacehealth.org)'
        required: false
        default: ''
      test_email:
        description: 'Email address for delivery tests (optional)'
        required: false
        default: ''

# Force GitHub-hosted actions (checkout, setup-node, upload-artifact) to run
# on Node.js 24, eliminating the Node.js 20 deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    name: E2E API Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # ── Guard: skip automatically if no deployed URL is configured ─────────────
    # Without a real BASE_URL the tests cannot run — localhost:3000 has no app.
    # Set the E2E_BASE_URL repository variable to enable auto-runs on push.
    # Manual workflow_dispatch with an explicit base_url always runs.
    if: vars.E2E_BASE_URL != '' || (github.event_name == 'workflow_dispatch' && inputs.base_url != '')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # Node 22 has native WebSocket — required by @supabase/realtime-js
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Preflight: verify secrets and connectivity ─────────────────────────
      # Supabase credentials are selected based on the target URL:
      #   dev.*  → DEV project   qa.* → QA project   else → PROD project
      - name: Preflight checks
        run: |
          URL="${{ inputs.base_url || vars.E2E_BASE_URL }}"
          echo "Target URL: $URL"

          # Check required secrets are present
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "❌  Supabase URL secret is not set for this environment."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "❌  Supabase anon key secret is not set for this environment."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "❌  Supabase service role key secret is not set for this environment."
            exit 1
          fi

          # Check target URL is reachable (10 second timeout)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
          if [ "$HTTP_CODE" = "000" ]; then
            echo "❌  Cannot reach $URL — is the app deployed and the URL correct?"
            exit 1
          fi
          echo "✅  $URL is reachable (HTTP $HTTP_CODE)"
        env:
          NEXT_PUBLIC_SUPABASE_URL: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_URL ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_URL  ||
                secrets.SUPABASE_PROD_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_ANON_KEY ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_ANON_KEY  ||
                secrets.SUPABASE_PROD_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_SERVICE_KEY ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_SERVICE_KEY  ||
                secrets.SUPABASE_PROD_SERVICE_KEY }}

      # ── Run E2E test suite ─────────────────────────────────────────────────
      - name: Run E2E test suite
        run: node scripts/e2e-test.js --report
        env:
          BASE_URL:                     ${{ inputs.base_url || vars.E2E_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_URL ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_URL  ||
                secrets.SUPABASE_PROD_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_ANON_KEY ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_ANON_KEY  ||
                secrets.SUPABASE_PROD_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_SERVICE_KEY ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_SERVICE_KEY  ||
                secrets.SUPABASE_PROD_SERVICE_KEY }}
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          CRON_SECRET:                  ${{ secrets.CRON_SECRET }}
          REPORT_PATH:                  e2e-report.md

      # ── Run email delivery test suite ─────────────────────────────────────
      # Runs when TEST_EMAIL variable or workflow_dispatch input is set.
      - name: Run email delivery tests
        if: vars.TEST_EMAIL != '' || (github.event_name == 'workflow_dispatch' && inputs.test_email != '')
        run: node scripts/e2e-email-test.js
        env:
          BASE_URL:                     ${{ inputs.base_url || vars.E2E_BASE_URL }}
          TEST_EMAIL:                   ${{ inputs.test_email || vars.TEST_EMAIL }}
          NEXT_PUBLIC_SUPABASE_URL: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_URL ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_URL  ||
                secrets.SUPABASE_PROD_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_ANON_KEY ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_ANON_KEY  ||
                secrets.SUPABASE_PROD_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: >-
            ${{ contains(inputs.base_url || vars.E2E_BASE_URL, 'dev.') && secrets.SUPABASE_DEV_SERVICE_KEY ||
                contains(inputs.base_url || vars.E2E_BASE_URL, 'qa.')  && secrets.SUPABASE_QA_SERVICE_KEY  ||
                secrets.SUPABASE_PROD_SERVICE_KEY }}
          CRON_SECRET:                  ${{ secrets.CRON_SECRET }}

      # ── Upload the report as a build artifact ─────────────────────────────
      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ github.sha }}
          path: e2e-report.md
          retention-days: 30

      # ── Post report to the job summary ────────────────────────────────────
      - name: Post report to job summary
        if: always()
        run: |
          if [ -f e2e-report.md ]; then
            echo "### E2E Test Report" >> $GITHUB_STEP_SUMMARY
            cat e2e-report.md >> $GITHUB_STEP_SUMMARY
          fi
