name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, qa, dev]

# Force GitHub-hosted actions (checkout, setup-node) to use Node.js 24
# eliminating the Node.js 20 deprecation warnings across all CI jobs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint + Typecheck + Frozen copy guard ──────────────────────────────────
  lint-typecheck:
    name: Lint · Typecheck · Frozen copy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Frozen affirmation copy guard
        run: node scripts/check-frozen-copy.js

  # ── Security audit ────────────────────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Dependency vulnerability audit (high+critical only)
        # --audit-level=high — warn on high, fail on critical
        run: npm audit --audit-level=critical
        continue-on-error: true   # don't block PRs on transitive vulns; review manually

      - name: Check for secrets in source code
        run: |
          # Hard-fail if any API key pattern appears in src/
          # (catches accidental commits of real keys)
          if grep -rE "(sk-ant-api|sk_live_|sk_test_|ENCRYPTION_KEY\s*=\s*[0-9a-f]{64})" src/ --include="*.ts" --include="*.tsx"; then
            echo "❌ Potential secret found in src/ — commit rejected"
            exit 1
          fi
          echo "✓ No secret patterns found in src/"

  # ── Build + Bundle size check ─────────────────────────────────────────────
  build:
    name: Build · Bundle size
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_ANON_KEY }}
      NEXT_PUBLIC_ENV: ci
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Stub values so validate-env.js passes in CI (no real DB calls)
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_DEV_SERVICE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY_CI }}
      RESEND_API_KEY: re_ci_stub_key
      FROM_EMAIL: noreply@soulspacehealth.org
      ADMIN_EMAIL: admin@soulspacehealth.org
      ADMIN_SECRET: ci_stub_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Env validation (CI mode)
        run: node scripts/validate-env.js
        continue-on-error: true   # CI stubs may not pass all prod guards

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: node scripts/check-bundle-size.js

  # ── Unit tests (no real API calls) ───────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: Run unit tests (excluding live AI tests)
        # Use a single regex pattern to ignore both live-AI test directories.
        # Separate --testPathIgnorePatterns args are parsed incorrectly by the
        # shell on Linux (the second value becomes a positional test path).
        run: npx jest --testPathIgnorePatterns="__tests__/(safety|mirror)" --passWithNoTests
        env:
          NEXT_PUBLIC_ENV: ci

  # ── RLS policy tests (only on migration changes) ─────────────────────────
  test-rls:
    name: RLS policy tests
    runs-on: ubuntu-latest
    # Only run when Supabase migrations or RLS scripts are changed
    if: |
      contains(github.event.head_commit.message, '[rls]') ||
      contains(toJson(github.event.pull_request.files), 'supabase/migrations')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci

      - name: RLS policy tests
        run: node scripts/test-rls.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_DEV_SERVICE_KEY }}
