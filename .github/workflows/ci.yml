name: CI
on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, qa, dev]
jobs:
  ci:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Run lint
        run: |
          npm run lint 2>&1 | tee /tmp/lint.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "## ❌ ESLint Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/lint.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_DEV }}
          NEXT_PUBLIC_ENV: ci
          NEXT_PUBLIC_APP_URL: http://localhost:3000
