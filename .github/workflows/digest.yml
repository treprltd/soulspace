name: Daily Digest

# ── When ──────────────────────────────────────────────────────────────────────
# Runs every day at 08:00 UTC:
#   08:00 UTC = 13:30 IST  (India)
#               04:00 EST  (US Eastern)
#               03:00 CST  (US Central)
#
# Also manually triggerable: Actions → Daily Digest → Run workflow.
#
# ── Required GitHub Secrets ───────────────────────────────────────────────────
#   CRON_SECRET   — must match CRON_SECRET in Amplify production env vars
#
# ── Required GitHub Variables (Settings → Variables → Actions) ───────────────
#   E2E_BASE_URL  — e.g. https://soulspacehealth.org

on:
  schedule:
    - cron: '0 8 * * *'      # 08:00 UTC every day
  workflow_dispatch:
    inputs:
      mode:
        description: 'Digest mode'
        required: false
        default: 'all'
        type: choice
        options: [all, admin_digest, user_digest]
      base_url:
        description: 'Override target URL (leave blank to use E2E_BASE_URL)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    name: Send daily digest
    runs-on: ubuntu-latest
    # NOTE: cannot reference secrets in job-level `if` — guard is inside the step

    steps:
      - name: Trigger digest endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Gracefully skip if CRON_SECRET is not configured
          if [ -z "$CRON_SECRET" ]; then
            echo "⏭️  CRON_SECRET not set — digest skipped."
            echo "    Add CRON_SECRET to GitHub Secrets (Settings → Secrets → Actions)"
            echo "    Value must match CRON_SECRET in Amplify production env vars."
            exit 0
          fi

          BASE="${{ inputs.base_url || vars.E2E_BASE_URL || 'https://soulspacehealth.org' }}"
          MODE="${{ inputs.mode || 'all' }}"

          echo "🕐  Triggering digest: $BASE/api/notifications/digest?mode=$MODE"
          echo "    Mode:   $MODE"
          echo "    Target: $BASE"
          echo ""

          HTTP_STATUS=$(curl -s -o /tmp/digest_response.json -w "%{http_code}" \
            -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            "$BASE/api/notifications/digest?mode=$MODE")

          BODY=$(cat /tmp/digest_response.json)
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:    $BODY"
          echo ""

          if [ "$HTTP_STATUS" = "401" ]; then
            echo "❌  401 Unauthorized — CRON_SECRET in GitHub Secrets does not match"
            echo "    the CRON_SECRET env var on Amplify production."
            exit 1
          fi

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌  Digest failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          # Parse and display results
          python3 - <<'PYEOF'
          import json, sys
          with open('/tmp/digest_response.json') as f:
              d = json.load(f)
          r  = d.get('results', {})
          ad = r.get('adminDigest', {})
          ud = r.get('userDigest', {})

          print("📊  Results:")
          if ad:
              if ad.get('sent'):
                  print(f"    ✅  Admin digest    → sent to {ad.get('to', 'ADMIN_EMAIL')}")
              elif ad.get('skipped'):
                  print(f"    ⏭️   Admin digest    → skipped ({ad.get('reason', '')})")
              else:
                  print(f"    ❌  Admin digest    → failed ({ad.get('error', '')})")
          if ud:
              sent    = ud.get('sent', 0)
              failed  = ud.get('failed', 0)
              elig    = ud.get('eligible', 0)
              cooldown = ud.get('skippedCooldown', 0)
              print(f"    📧  Re-engagement  → sent={sent}  eligible={elig}  cooldown_skipped={cooldown}  failed={failed}")
          PYEOF

          echo ""
          echo "✅  Digest completed."

      - name: Post to job summary
        if: always()
        run: |
          {
            echo "### Daily Digest — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "- **Mode:** \`${{ inputs.mode || 'all' }}\`"
            echo "- **Target:** \`${{ inputs.base_url || vars.E2E_BASE_URL || 'https://soulspacehealth.org' }}\`"
            if [ -f /tmp/digest_response.json ]; then
              echo ""
              echo "\`\`\`json"
              cat /tmp/digest_response.json
              echo ""
              echo "\`\`\`"
            fi
          } >> $GITHUB_STEP_SUMMARY
