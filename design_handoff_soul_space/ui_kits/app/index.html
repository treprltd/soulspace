<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Soul Space — Session flow</title>
  <link rel="stylesheet" href="../_shared/base.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html, body { margin: 0; background: #03080F; min-height: 100vh; }
    body {
      display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,.08), transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(42,140,122,.06), transparent 70%),
        #03080F;
      font-family: var(--font-sans);
    }
    .stage {
      display: grid; grid-template-columns: 280px 1fr; gap: 48px;
      width: 100%; max-width: 1200px; align-items: center;
    }
    .stage-label {
      color: var(--sand2);
    }
    .stage-label .eyebrow {
      font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 18px;
    }
    .stage-label h1 {
      font-family: var(--font-serif); font-weight: 300;
      font-size: 40px; line-height: 1.15; margin: 0 0 14px;
      color: var(--sand2);
    }
    .stage-label h1 em { color: var(--gold2); font-style: italic; }
    .stage-label p {
      font-size: 14px; color: var(--mist); line-height: 1.65; margin: 0 0 24px;
    }
    .stage-label .meta {
      font-size: 11px; letter-spacing: .08em; color: rgba(139,167,184,.55);
      border-top: 1px solid rgba(245,237,216,.08); padding-top: 16px;
    }
    .phone {
      width: 420px; height: 860px; margin: 0 auto;
      border-radius: 52px; padding: 14px;
      background: linear-gradient(180deg, #1a1f28 0%, #0b1018 100%);
      box-shadow:
        0 0 0 1.5px rgba(245,237,216,.06),
        0 40px 80px -20px rgba(0,0,0,.7),
        0 20px 40px -10px rgba(0,0,0,.5);
      position: relative;
    }
    .phone::before {
      content: ''; position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 28px; border-radius: 999px; background: #03080F; z-index: 10;
    }
    .phone-screen {
      width: 100%; height: 100%;
      border-radius: 40px; overflow: hidden;
      background: #060E18; position: relative;
    }
    .phone-screen > div {
      width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
    }
    .phone-screen > div::-webkit-scrollbar { display: none; }
    .stepper {
      position: absolute; top: 12px; right: 12px; z-index: 50;
      display: flex; flex-wrap: wrap; gap: 4px; max-width: 280px;
      background: rgba(8,17,28,.92); padding: 6px 8px; border-radius: 12px;
      border: 1px solid rgba(245,237,216,.06); backdrop-filter: blur(8px);
    }
    .stepper button {
      background: transparent; border: 0; color: var(--mist);
      font-size: 9px; padding: 3px 8px; border-radius: 999px; cursor: pointer;
      font-family: var(--font-sans);
    }
    .stepper button.active { color: var(--gold); background: rgba(201,168,76,.12); }
    @media (max-width: 980px) {
      .stage { grid-template-columns: 1fr; gap: 28px; }
      .stage-label { text-align: center; max-width: 480px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <aside class="stage-label">
      <div class="eyebrow">Soul Space · Session</div>
      <h1>A 7-minute loop that <em>doesn't try to fix you.</em></h1>
      <p>Ten screens, mobile-first. Tap any label on the right to step through the flow: age gate, resonance, emotions, intensity, context, loading, mirror, season, next step, crisis.</p>
      <div class="meta">PHASE 1 · PHONE-SIZED · CLICK-THROUGH</div>
    </aside>
    <div class="phone">
      <div class="phone-screen">
        <div id="root"></div>
      </div>
    </div>
  </div>
  <script type="text/babel" src="../_shared/Primitives.jsx"></script>
  <script type="text/babel" src="Screens.jsx"></script>
  <script type="text/babel">
    const ORDER = ['age','resonance','emotions','intensity','context','loading','mirror','season','nextstep','crisis'];
    const LABEL = { age:'age', resonance:'resonance', emotions:'emotions', intensity:'intensity', context:'context', loading:'load', mirror:'mirror', season:'season', nextstep:'next', crisis:'crisis' };

    function App() {
      const [screen, setScreen] = React.useState('age');
      const [data, setData] = React.useState({});
      const set = (k, v) => setData(d => ({ ...d, [k]: v }));
      const go = (s) => setScreen(s);
      const props = { go, set, data };
      let view;
      switch (screen) {
        case 'age':      view = <AgeGate {...props} />; break;
        case 'resonance':view = <Resonance {...props} />; break;
        case 'emotions': view = <Emotions {...props} />; break;
        case 'intensity':view = <Intensity {...props} />; break;
        case 'context':  view = <Context {...props} />; break;
        case 'loading':  view = <Loading {...props} />; break;
        case 'mirror':   view = <Mirror {...props} />; break;
        case 'season':   view = <SeasonScreen {...props} />; break;
        case 'nextstep': view = <NextStep {...props} />; break;
        case 'crisis':   view = <Crisis {...props} />; break;
        default: view = <AgeGate {...props} />;
      }
      return (
        <>
          <nav className="stepper">
            {ORDER.map(s => (
              <button key={s} onClick={() => setScreen(s)} className={s === screen ? 'active' : ''}>{LABEL[s]}</button>
            ))}
          </nav>
          <div style={{ position:'relative', minHeight:'100%' }}>{view}</div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
