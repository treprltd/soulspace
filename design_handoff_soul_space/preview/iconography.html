<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; align-items: center; justify-items: center; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.lbl { font-size: 8px; color: var(--mist); }
.spin {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid rgba(201,168,76,.08); border-top-color: var(--gold);
  animation: sp 1.2s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }
.glyph { font-family: var(--font-sans); font-size: 18px; color: var(--gold); }
.note { font-size: 9px; color: var(--mist-55); grid-column: 1 / -1; text-align: center; margin-top: 4px; line-height: 1.5; }
</style></head><body>
<div class="grid">
  <div class="cell"><svg width="32" height="32" viewBox="0 0 44 44" fill="none" stroke="#6B8CAE" stroke-width="1.2" stroke-linecap="round"><path d="M22 4v36M4 22h36M8.5 8.5l27 27M35.5 8.5l-27 27"/><circle cx="22" cy="22" r="4"/></svg><div class="lbl">winter</div></div>
  <div class="cell"><svg width="32" height="32" viewBox="0 0 44 44" fill="none" stroke="#2A8C7A" stroke-width="1.2" stroke-linecap="round"><path d="M22 40V18M15 25l7-7 7 7M10 36c0-9 5-15 12-17M34 36c0-9-5-15-12-17"/><circle cx="22" cy="10" r="3"/></svg><div class="lbl">spring</div></div>
  <div class="cell"><svg width="32" height="32" viewBox="0 0 44 44" fill="none" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"><circle cx="22" cy="22" r="7"/><path d="M22 5v4M22 35v4M5 22h4M35 22h4M10 10l3 3M31 31l3 3M34 10l-3 3M13 31l-3 3"/></svg><div class="lbl">summer</div></div>
  <div class="cell"><svg width="32" height="32" viewBox="0 0 44 44" fill="none" stroke="#C4784A" stroke-width="1.2" stroke-linecap="round"><path d="M14 38c0-12 7-20 18-22-2 8-7 14-18 22z"/><path d="M26 34c0-8 5-13 14-14"/><path d="M22 38V26M18 32l4-6 4 6"/></svg><div class="lbl">autumn</div></div>
  <div class="cell"><svg width="32" height="32" viewBox="0 0 20 20" fill="none" stroke="#3DAF96" stroke-width="1.5" stroke-linecap="round"><path d="M10 2l7 4v6C17 16.5 13.8 19.5 10 20.5 6.2 19.5 3 16.5 3 12V6l7-4z"/></svg><div class="lbl">shield</div></div>
  <div class="cell"><div class="spin"></div><div class="lbl">spinner</div></div>
  <div class="cell"><span class="glyph">→</span><div class="lbl">arrow</div></div>
  <div class="cell"><span class="glyph" style="color:var(--teal2);">✓</span><div class="lbl">check / cross</div></div>
</div>
<div class="note">5 custom SVG families + 3 ASCII glyphs. No icon font. No emoji. Stroke 1.2–1.5 round.</div>
</body></html>
