<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw   { border-radius: 10px; height: 130px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
.name { font-size: 11px; color: #1a1408; }
.hex  { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: rgba(26,20,8,.7); }
.role { font-size: 9px; color: rgba(26,20,8,.6); margin-top: 2px; }
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#C9A84C;">
    <div><div class="name">gold</div><div class="role">primary · CTAs, eyebrows</div></div>
    <div class="hex">#C9A84C</div>
  </div>
  <div class="sw" style="background:#E8C97A;">
    <div><div class="name">gold2</div><div class="role">em emphasis · headlines</div></div>
    <div class="hex">#E8C97A</div>
  </div>
  <div class="sw" style="background:#F5DFA0;">
    <div><div class="name">gold3</div><div class="role">rare emphasis</div></div>
    <div class="hex">#F5DFA0</div>
  </div>
</div>
</body></html>
