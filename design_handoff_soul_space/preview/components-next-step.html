<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.actions { }
.act {
  width: 100%; text-align: left; display: flex; align-items: flex-start; gap: 8px;
  border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
  font-size: 11px; line-height: 1.6; cursor: pointer; transition: all .15s;
  border: 1px solid rgba(201,168,76,.1); background: transparent; color: var(--sand);
  font-family: var(--font-sans);
}
.act.selected { color: var(--gold2); border-color: rgba(201,168,76,.45); background: rgba(201,168,76,.06); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(201,168,76,.25); margin-top: 6px; flex-shrink: 0; }
.act.selected .dot { background: var(--gold); }
.custom {
  display: flex; align-items: flex-start; gap: 8px;
  border-radius: 12px; padding: 12px 14px;
  border: 1px dashed rgba(201,168,76,.15);
}
.custom .dot { background: rgba(245,237,216,.07); margin-top: 7px; }
.custom span { font-size: 11px; color: rgba(139,167,184,.5); font-style: italic; }
</style></head><body>
<div class="actions">
  <button class="act"><span class="dot"></span>Write down the two things that are in tension, side by side, without trying to resolve them yet.</button>
  <button class="act selected"><span class="dot"></span>Give yourself permission to not decide anything today — just for the next 24 hours.</button>
  <div class="custom"><span class="dot"></span><span>Write your own — what would actually feel right?</span></div>
</div>
</body></html>
