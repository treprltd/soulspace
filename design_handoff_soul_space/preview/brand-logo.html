<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.cell {
  background: rgba(15,30,46,.6);
  border: 1px solid rgba(201,168,76,.12);
  border-radius: 14px;
  padding: 22px 18px 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 132px;
}
.lbl {
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--mist);
  margin-top: 14px;
}
/* Wordmark */
.wm { display:flex; align-items:baseline; }
.wm .a { font-family: var(--font-serif); font-weight: 300; font-style: italic; color: var(--sand2); font-size: 26px; }
.wm .b { font-family: var(--font-serif); font-weight: 400; color: var(--gold); font-size: 26px; }
/* Stacked */
.stk { display:flex; flex-direction:column; align-items:center; gap:6px; }
.stk .a { font-family: var(--font-serif); font-weight: 300; font-style: italic; color: var(--sand2); font-size: 22px; line-height: 1; }
.stk .rule { width: 28px; height: 1px; background: var(--gold); }
.stk .b { font-family: var(--font-serif); font-weight: 400; color: var(--gold); font-size: 22px; line-height: 1; letter-spacing: .04em; }
/* Monogram circle */
.mono {
  width: 64px; height: 64px;
  border: 1px solid rgba(201,168,76,.5);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-weight: 300;
  font-style: italic;
  font-size: 30px;
  color: var(--gold);
  position: relative;
}
.mono::before {
  content: "";
  position: absolute; left: 50%; top: -1px;
  width: 14px; height: 2px; transform: translateX(-50%);
  background: #060E18;
}
</style></head><body>
<div class="grid">
  <div class="cell">
    <span class="wm"><span class="a">Soul&nbsp;</span><span class="b">Space</span></span>
    <span class="lbl">Primary wordmark</span>
  </div>

  <div class="cell">
    <div class="stk">
      <span class="a">Soul</span>
      <span class="rule"></span>
      <span class="b">Space</span>
    </div>
    <span class="lbl">Stacked lockup</span>
  </div>

  <div class="cell">
    <svg width="62" height="62" viewBox="0 0 64 64" fill="none" stroke="#C9A84C" stroke-width="1.1" stroke-linecap="round">
      <!-- gap-circle: the pause -->
      <path d="M32 4a28 28 0 1 1 -19.5 7.9" />
      <circle cx="32" cy="32" r="3" fill="#C9A84C" stroke="none"/>
    </svg>
    <span class="lbl">The Pause · gap-circle</span>
  </div>

  <div class="cell">
    <svg width="62" height="62" viewBox="0 0 64 64" fill="none" stroke="#C9A84C" stroke-width="1" stroke-linecap="round">
      <!-- four seasons quadrant -->
      <circle cx="32" cy="32" r="26" stroke-opacity=".35"/>
      <path d="M32 6 V58 M6 32 H58" stroke-opacity=".25"/>
      <path d="M32 6 a26 26 0 0 1 26 26" stroke="#C9A84C" stroke-width="1.6"/>
      <circle cx="32" cy="32" r="2.5" fill="#C9A84C" stroke="none"/>
    </svg>
    <span class="lbl">Seasonal mark · quadrant</span>
  </div>

  <div class="cell" style="grid-column: span 2; flex-direction: row; gap: 18px; justify-content:flex-start; padding: 18px 24px; min-height: 84px;">
    <div class="mono">S</div>
    <div style="text-align:left;">
      <div style="font-family: var(--font-serif); font-weight: 300; font-style: italic; color: var(--sand2); font-size: 22px; line-height: 1;">Soul <span style="color:var(--gold); font-style: normal; font-weight: 400;">Space</span></div>
      <div style="font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--mist); margin-top: 8px;">Monogram + wordmark lockup</div>
    </div>
  </div>
</div>
</body></html>
