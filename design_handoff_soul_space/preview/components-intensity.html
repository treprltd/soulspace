<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.wrap { background: rgba(15,30,46,.6); border: 1px solid rgba(245,237,216,.06); border-radius: 12px; padding: 18px; }
.head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; }
.head .l { font-size: 12px; color: var(--mist); }
.head .v { font-family: var(--font-serif); color: var(--gold2); font-size: 20px; }
.track { position: relative; height: 2px; border-radius: 2px; background: rgba(245,237,216,.07); margin-bottom: 6px; }
.fill { position: absolute; left:0; top:0; height: 100%; width: 60%; border-radius: 2px; background: linear-gradient(90deg, rgba(201,168,76,.4), var(--gold)); }
.knob { position: absolute; top: 50%; left: 60%; transform: translate(-50%,-50%); width: 14px; height: 14px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,.4); }
.scale { display:flex; justify-content: space-between; font-size: 9px; margin-top: 8px; }
.scale .m { color: var(--gold2); font-style: italic; font-family: var(--font-serif); }
.scale .e { color: var(--mist); }
</style></head><body>
<div class="wrap">
  <div class="head"><span class="l">Weight</span><span class="v">7 / 10</span></div>
  <div class="track"><div class="fill"></div><div class="knob"></div></div>
  <div class="scale"><span class="e">Barely there</span><span class="m">Hard to think clearly</span><span class="e">Overwhelming</span></div>
</div>
</body></html>
