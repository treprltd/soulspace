<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.s { border-radius: 12px; padding: 14px; min-height: 160px; display:flex; flex-direction:column; gap:8px; }
.s .lbl { font-size: 7px; letter-spacing: .14em; text-transform: uppercase; }
.s .name { font-family: var(--font-serif); font-weight: 300; font-style: italic; font-size: 18px; }
.s .hex { font-family: ui-monospace, Menlo, monospace; font-size: 9px; opacity: .75; margin-top:auto; }
.s svg { align-self: center; margin-bottom: 2px; }
</style></head><body>
<div class="grid">
  <div class="s" style="background:rgba(20,32,50,.97); border:1px solid rgba(107,140,174,.25);">
    <svg width="24" height="24" viewBox="0 0 44 44" fill="none" stroke="#6B8CAE" stroke-width="1.4" stroke-linecap="round"><path d="M22 4v36M4 22h36M8.5 8.5l27 27M35.5 8.5l-27 27"/><circle cx="22" cy="22" r="4"/></svg>
    <div class="lbl" style="color:#6B8CAE;">Winter</div>
    <div class="name" style="color:#C8DCF0;">Heaviness</div>
    <div class="hex" style="color:#8AAAC8;">#6B8CAE</div>
  </div>
  <div class="s" style="background:rgba(18,38,32,.97); border:1px solid rgba(42,140,122,.25);">
    <svg width="24" height="24" viewBox="0 0 44 44" fill="none" stroke="#2A8C7A" stroke-width="1.4" stroke-linecap="round"><path d="M22 40V18M15 25l7-7 7 7M10 36c0-9 5-15 12-17M34 36c0-9-5-15-12-17"/><circle cx="22" cy="10" r="3"/></svg>
    <div class="lbl" style="color:#2A8C7A;">Spring</div>
    <div class="name" style="color:#B8E8D4;">Beginning</div>
    <div class="hex" style="color:#7ABDA0;">#2A8C7A</div>
  </div>
  <div class="s" style="background:rgba(38,30,12,.97); border:1px solid rgba(201,168,76,.3);">
    <svg width="24" height="24" viewBox="0 0 44 44" fill="none" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"><circle cx="22" cy="22" r="7"/><path d="M22 5v4M22 35v4M5 22h4M35 22h4M10 10l3 3M31 31l3 3M34 10l-3 3M13 31l-3 3"/></svg>
    <div class="lbl" style="color:#C9A84C;">Summer</div>
    <div class="name" style="color:#F2DFA0;">Clarity</div>
    <div class="hex" style="color:#C8A860;">#C9A84C</div>
  </div>
  <div class="s" style="background:rgba(36,20,12,.97); border:1px solid rgba(196,120,74,.3);">
    <svg width="24" height="24" viewBox="0 0 44 44" fill="none" stroke="#C4784A" stroke-width="1.4" stroke-linecap="round"><path d="M14 38c0-12 7-20 18-22-2 8-7 14-18 22z"/><path d="M26 34c0-8 5-13 14-14"/><path d="M22 38V26M18 32l4-6 4 6"/></svg>
    <div class="lbl" style="color:#C4784A;">Autumn</div>
    <div class="name" style="color:#F0C8A0;">Letting go</div>
    <div class="hex" style="color:#C88060;">#C4784A</div>
  </div>
</div>
</body></html>
