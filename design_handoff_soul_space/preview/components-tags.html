<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.tag {
  padding: 9px 16px;
  border-radius: 999px;
  font-size: 14px;
  line-height: 1;
  color: var(--mist);
  border: 1px solid rgba(201,168,76,.2);
  background: transparent;
  font-family: var(--font-sans);
  letter-spacing: .005em;
  display: inline-flex;
  align-items: center;
}
.tag.selected {
  color: var(--gold2);
  border-color: rgba(201,168,76,.55);
  background: rgba(201,168,76,.08);

.tags { display: flex; flex-wrap: wrap; gap: 8px; }
.note { font-size: 12px; color: var(--mist); margin-top: 16px; line-height: 1.5; }
</style></head><body>
<div class="eb">Emotion tags · selectable chips</div>
<div class="tags">
  <span class="tag">Overwhelmed</span>
  <span class="tag selected">Stuck</span>
  <span class="tag">Uncertain</span>
  <span class="tag">Pressured</span>
  <span class="tag selected">Anxious</span>
  <span class="tag">Conflicted</span>
  <span class="tag">Exhausted</span>
  <span class="tag">Numb</span>
  <span class="tag selected">Hopeful</span>
  <span class="tag">Frustrated</span>
  <span class="tag">Lonely</span>
  <span class="tag">Grief</span>
</div>
<div class="note">15 fixed tags · multi-select · border .20 → .55 when selected · text mist → gold2.</div>
</body></html>
