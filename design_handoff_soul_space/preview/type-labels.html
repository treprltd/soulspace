<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.row { display:flex; align-items: center; gap: 22px; padding: 14px 0; border-bottom: 1px solid var(--hairline); }
.row:last-child { border: 0; }
.tag {
  font-size: 11px; color: var(--mist); width: 110px; flex-shrink: 0;
  font-family: ui-monospace, Menlo, monospace; letter-spacing: .02em;
}
.eyebrow {
  font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold);
  display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before { content:''; display:inline-block; width:18px; height:1px; background: var(--gold); flex-shrink: 0; }
.micro { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold); }
.affirm {
  font-family: var(--font-serif); font-style: italic;
  font-size: 18px; color: rgba(190,210,225,.85); line-height: 1.7;
}
</style></head><body>
<div class="row"><div class="tag">.eyebrow</div><div class="eyebrow">Phase 1 · Behavior validation</div></div>
<div class="row"><div class="tag">.micro-label</div><div class="micro">What you're carrying</div></div>
<div class="row"><div class="tag">.affirm-copy</div><div class="affirm">You do not need to explain everything right away.</div></div>
</body></html>
