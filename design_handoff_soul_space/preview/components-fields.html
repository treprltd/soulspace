<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
label {
  display: block;
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--mist);
  margin-bottom: 8px;
}
input {
  width: 100%;
  padding: 14px 16px;
  font-size: 15px;
  line-height: 1.4;
  color: var(--sand);
  border-radius: 10px;
  background: rgba(245,237,216,.04);
  border: 1px solid rgba(245,237,216,.18);
  font-family: var(--font-sans);
  box-sizing: border-box;
  outline: none;
}
input::placeholder { color: rgba(139,167,184,.55); font-style: italic; }
textarea {
  width: 100%;
  padding: 14px 16px;
  font-size: 15px;
  line-height: 1.55;
  color: var(--sand);
  border-radius: 10px;
  background: rgba(245,237,216,.03);
  border: 1px solid rgba(245,237,216,.18);
  font-family: var(--font-sans);
  font-style: italic;
  resize: none;
  box-sizing: border-box;
  outline: none;
}
textarea::placeholder { color: rgba(139,167,184,.55); }
.meta {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--mist);
  margin-top: 6px;
}
.meta .m { font-style: italic; }
.gap { height: 18px; }
</style></head><body>
<label>Email · magic link</label>
<input type="email" placeholder="your@email.com" />
<div class="gap"></div>
<label>Context · what's happening</label>
<textarea rows="3" placeholder="Start wherever feels natural...">It keeps coming back to whether to leave. I love the work but I can feel myself getting smaller in the room.</textarea>
<div class="meta"><span class="m">Just start — no minimum</span><span>112 / 800</span></div>
</body></html>
