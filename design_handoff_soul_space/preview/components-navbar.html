<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
body { padding: 0; }
.nav {
  height: 64px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; border-bottom: 1px solid rgba(245,237,216,.06);
}
.wm { font-family: var(--font-serif); font-weight: 300; font-size: 22px; color: var(--sand2); }
.wm em { color: var(--gold); font-style: italic; font-weight: 400; }
.right { display: flex; align-items: center; gap: 20px; }
.right a { font-size: 14px; color: var(--mist); text-decoration: none; }
.right a.btn,
a.btn {
  padding: 10px 20px;
  background: var(--gold);
  color: #08111C !important;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .01em;
  border-radius: 8px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.label { font-size: 12px; color: var(--mist); }
.frame { background: rgba(8,17,28,.98); }
.note { padding: 14px 24px; font-size: 12px; color: var(--mist); }
</style></head><body>
<div class="frame">
  <div class="nav">
    <span class="wm">Soul <em>Space</em></span>
    <div class="right"><a>Settings</a><a class="btn">Begin →</a></div>
  </div>
</div>
<div class="frame" style="border-top: 1px solid rgba(245,237,216,.08);">
  <div class="nav" style="height: 52px; padding: 0 24px;">
    <span class="wm" style="font-size:16px;">Soul <em>Space</em></span>
    <span class="label">Step 1 of 3</span>
  </div>
</div>

</body></html>
