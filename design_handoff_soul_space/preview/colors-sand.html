<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw   { border-radius: 10px; height: 130px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--hairline); }
.name { font-size: 11px; }
.hex  { font-family: ui-monospace, Menlo, monospace; font-size: 10px; }
.role { font-size: 9px; margin-top: 2px; }
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#F5EDD8;">
    <div><div class="name" style="color:#1a1408;">sand</div><div class="role" style="color:rgba(26,20,8,.6);">body on dark</div></div>
    <div class="hex" style="color:rgba(26,20,8,.7);">#F5EDD8</div>
  </div>
  <div class="sw" style="background:#FAF7F0;">
    <div><div class="name" style="color:#1a1408;">sand2</div><div class="role" style="color:rgba(26,20,8,.6);">titles · high emphasis</div></div>
    <div class="hex" style="color:rgba(26,20,8,.7);">#FAF7F0</div>
  </div>
  <div class="sw" style="background:#8BA7B8;">
    <div><div class="name" style="color:#0a1218;">mist</div><div class="role" style="color:rgba(10,18,24,.6);">secondary text · captions</div></div>
    <div class="hex" style="color:rgba(10,18,24,.7);">#8BA7B8</div>
  </div>
</div>
</body></html>
