<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.scale { display: flex; align-items: flex-end; gap: 12px; padding: 14px 0; }
.s { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.box { background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.3); border-radius: 4px; }
.lbl { font-family: ui-monospace, Menlo, monospace; font-size: 9px; color: var(--mist); }
.note { font-size: 10px; color: var(--mist-55); margin-top: 6px; }
</style></head><body>
<div class="eb">Spacing scale · px</div>
<div class="scale">
  <div class="s"><div class="box" style="width:4px;height:4px;"></div><div class="lbl">4</div></div>
  <div class="s"><div class="box" style="width:8px;height:8px;"></div><div class="lbl">8</div></div>
  <div class="s"><div class="box" style="width:10px;height:10px;"></div><div class="lbl">10</div></div>
  <div class="s"><div class="box" style="width:12px;height:12px;"></div><div class="lbl">12</div></div>
  <div class="s"><div class="box" style="width:14px;height:14px;"></div><div class="lbl">14</div></div>
  <div class="s"><div class="box" style="width:16px;height:16px;"></div><div class="lbl">16</div></div>
  <div class="s"><div class="box" style="width:20px;height:20px;"></div><div class="lbl">20</div></div>
  <div class="s"><div class="box" style="width:24px;height:24px;"></div><div class="lbl">24</div></div>
  <div class="s"><div class="box" style="width:32px;height:32px;"></div><div class="lbl">32</div></div>
</div>
<div class="note">Tight scale. Most card padding is 14–16; section gaps run 20–24. The product never sprawls.</div>
</body></html>
