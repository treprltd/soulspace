<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw   { border-radius: 10px; height: 120px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--hairline); }
.name { font-size: 11px; color: var(--sand2); }
.hex  { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--mist); }
.role { font-size: 9px; color: var(--mist-55); margin-top: 2px; }
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#060E18;">
    <div><div class="name">bg</div><div class="role">page background</div></div>
    <div class="hex">#060E18</div>
  </div>
  <div class="sw" style="background:#08111C;">
    <div><div class="name">ink</div><div class="role">nav, panels</div></div>
    <div class="hex">#08111C</div>
  </div>
  <div class="sw" style="background:#0F1E2E;">
    <div><div class="name">ink2</div><div class="role">cards</div></div>
    <div class="hex">#0F1E2E</div>
  </div>
  <div class="sw" style="background:#162638;">
    <div><div class="name">ink3</div><div class="role">raised</div></div>
    <div class="hex">#162638</div>
  </div>
</div>
</body></html>
