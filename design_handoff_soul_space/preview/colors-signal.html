<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><style>
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sw   { border-radius: 10px; height: 130px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; }
.name { font-size: 11px; color: #fff; }
.hex  { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: rgba(255,255,255,.75); }
.role { font-size: 9px; color: rgba(255,255,255,.65); margin-top: 2px; }
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#2A8C7A;">
    <div><div class="name">teal</div><div class="role">affirmative · Spring</div></div>
    <div class="hex">#2A8C7A</div>
  </div>
  <div class="sw" style="background:#3DAF96;">
    <div><div class="name">teal2</div><div class="role">accent · hover</div></div>
    <div class="hex">#3DAF96</div>
  </div>
  <div class="sw" style="background:#D44040;">
    <div><div class="name">danger</div><div class="role">crisis · destructive</div></div>
    <div class="hex">#D44040</div>
  </div>
</div>
</body></html>
